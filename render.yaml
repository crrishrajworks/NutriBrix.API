services:
  - type: web
    name: nutribrix-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://nutribrix-website.vercel.app
      - key: NODE_ENV
        value: production
